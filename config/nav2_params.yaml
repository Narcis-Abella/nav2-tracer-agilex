# Nav2 Humble — Tracer Agilex 2.0 + Livox Mid-360
# SocialTech Challenge | Jetson Orin NX 16GB
# See nav2_workflow_final.txt for full design rationale
#
# CRITICAL VALUES TO VALIDATE ON-SITE (day before):
#   inflation_radius        — verify 80cm doors still passable (start 0.07m)
#   footprint               — measure Tracer+chair after real mounting
#   FAST-LIO2 stability     — htop+tegrastats during turns
#   stvl decay_acceleration — verify dynamic robot clears fast when seen
#   Spin recovery           — verify 90° turn fits in 120cm corridor
#   movement_time_allowance — tune to observed obstacle behavior
#   MPPI batch_size         — monitor CPU: 2000 samples @30Hz

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_link
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: map
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 50.0
    laser_min_range: 0.45
    laser_model_type: likelihood_field
    max_beams: 120
    max_particles: 2000
    min_particles: 500
    odom_frame_id: odom
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: nav2_amcl::DifferentialMotionModel
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: /scan
    map_topic: /map
    set_initial_pose: false
    always_reset_initial_pose: false
    first_map_only_: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom_lidar
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: [navigate_to_pose, navigate_through_poses]
    navigate_to_pose:
      plugin: nav2_bt_navigator/NavigateToPoseNavigator
    navigate_through_poses:
      plugin: nav2_bt_navigator/NavigateThroughPosesNavigator
    default_nav_to_pose_bt_xml: bt_xml/navigate_w_replanning_and_recovery.xml
    default_nav_through_poses_bt_xml: bt_xml/navigate_w_replanning_and_recovery.xml
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_progress_checker_selector_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_navigate_through_poses_action_bt_node

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 30.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    speed_limit_topic: /speed_limit
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.5
      movement_time_allowance: 15.0  # VALIDATE: tune to obstacle behavior in test

    general_goal_checker:
      stateful: true
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.1

    FollowPath:
      # RotationShim wraps MPPI — rotates to heading before tracking
      plugin: nav2_rotation_shim_controller::RotationShimController
      primary_controller: nav2_mppi_controller::MPPIController
      angular_dist_threshold: 0.785   # ~45deg before shim activates
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 1.8
      max_angular_accel: 3.2
      simulate_ahead_time: 1.0
      rotate_to_goal_heading: false

      # MPPI parameters
      time_steps: 56
      model_dt: 0.05         # horizon = 56 * 0.05 = 2.8s
      batch_size: 2000       # VALIDATE: monitor CPU on Jetson Orin NX
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 1.0            # normal operational speed
      vx_min: -0.35
      wz_max: 1.9
      vy_max: 0.0            # diff drive: no lateral
      iteration_count: 1
      prune_distance: 1.5
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: DiffDrive
      visualize: false
      reset_period: 1.0
      retry_attempt_limit: 1
      regenerate_noises: false

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      critics: [ConstraintCritic, CostCritic, GoalCritic, GoalAngleCritic,
                PathAlignCritic, PathFollowCritic, PathAngleCritic, PreferForwardCritic]

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5

      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        inflation_layer_name: inflation_layer  # dynamic slowdown near obstacles

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 6
        threshold_to_consider: 1.4

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.2
        forward_preference: true

      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5

planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: [SmacPlanner2D]

    SmacPlanner2D:
      plugin: nav2_smac_planner/SmacPlanner2D
      tolerance: 0.5
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 3.5
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: [simple_smoother]

    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true
      w_smooth: 0.3
      w_data: 0.2
      refinement_num: 2

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: /local_costmap/costmap_raw
    global_costmap_topic: /global_costmap/costmap_raw
    local_footprint_topic: /local_costmap/published_footprint
    global_footprint_topic: /global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [spin, backup, wait, assisted_teleop]
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    wait:
      plugin: nav2_behaviors/Wait
    assisted_teleop:
      plugin: nav2_behaviors/AssistedTeleop
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 0

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""    # set via launch arg
    topic_name: /map
    frame_id: map

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      rolling_window: false
      resolution: 0.05
      track_unknown_space: true
      # VALIDATE: measure Tracer+chair after real mount. Current: ~70x61cm body.
      footprint: "[[0.35, 0.305], [0.35, -0.305], [-0.35, -0.305], [-0.35, 0.305]]"
      footprint_padding: 0.0
      plugins: [static_layer, stvl_layer, inflation_layer]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
        enabled: true
        subscribe_to_updates: true
        transform_tolerance: 0.1

      stvl_layer:
        plugin: spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer
        enabled: true
        voxel_decay: 30.0          # outside FOV: persist 30s before decay
        decay_model: 0             # 0=linear
        voxel_size: 0.05
        track_unknown_space: true
        max_obstacle_height: 2.0
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1      # 1=max
        obstacle_range: 5.0
        origin_z: 0.0
        publish_voxel_map: false
        transform_tolerance: 0.2
        mapping_mode: false
        observation_sources: livox
        livox:
          data_type: PointCloud2
          topic: /livox/lidar
          marking: true
          clearing: true
          model_type: 1              # 3D LiDAR (not depth camera)
          vertical_fov_angle: 1.01   # 58deg total FOV Mid-360
          vertical_fov_offset: 0.39  # +22.5deg offset (asymmetric FOV)
          horizontal_fov_angle: 3.49 # ~200deg with chair mount
          decay_acceleration: 15.0   # inside FOV: fast clear (~2s)
          min_obstacle_height: 0.1
          max_obstacle_height: 2.0
          expected_update_rate: 10.0
          filter: passthrough

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        enabled: true
        # VALIDATE: must keep 80cm doors passable.
        # Robot footprint ~70cm wide. Door 80cm. Margin 5cm each side.
        # inflation_radius < 0.095m. Start at 0.07m and test.
        inflation_radius: 0.08
        cost_scaling_factor: 3.5
        inflate_unknown: false
        inflate_around_unknown: false

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[[0.35, 0.305], [0.35, -0.305], [-0.35, -0.305], [-0.35, 0.305]]"
      footprint_padding: 0.0
      plugins: [obstacle_layer, voxel_layer, inflation_layer]

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0
          observation_persistence: 0.5

      voxel_layer:
        plugin: nav2_costmap_2d::VoxelLayer
        enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: livox
        livox:
          topic: /livox/lidar
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: PointCloud2
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        enabled: true
        inflation_radius: 0.08
        cost_scaling_factor: 3.5
        inflate_unknown: false
        inflate_around_unknown: false
